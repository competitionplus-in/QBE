<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Mock Test | Competition Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-select { user-select: none; } /* Prevents copying questions */
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col overflow-hidden no-select">

    <nav class="bg-slate-900 text-white px-6 py-3 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold border-r border-slate-700 pr-4">Competition <span class="text-blue-400">Plus</span></h1>
            <span class="text-sm text-slate-400 hidden md:inline">Full Length Mock Test #01</span>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2 bg-slate-800 px-4 py-1.5 rounded-full border border-slate-700">
                <i class="fas fa-clock text-blue-400"></i>
                <span id="timer" class="font-mono text-lg font-bold">120:00</span>
            </div>
            <button onclick="confirmSubmit()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-1.5 rounded-lg font-bold transition">
                SUBMIT TEST
            </button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center">
                    <span class="bg-blue-700 text-white px-3 py-1 rounded text-xs font-bold uppercase">Question 01</span>
                    <div class="flex gap-4 text-xs font-bold">
                        <span class="text-green-600">+1.0 Mark</span>
                        <span class="text-red-600">-0.33 Negative</span>
                    </div>
                </div>

                <div class="p-6 md:p-10">
                    <p class="text-lg md:text-xl text-slate-800 font-semibold mb-8 leading-relaxed">
                        As per IS 456:2000, what is the minimum grade of concrete for a pre-stressed concrete structural member?
                    </p>

                    <div class="space-y-4">
                        <label class="flex items-center p-4 border-2 border-slate-100 rounded-xl hover:bg-blue-50 hover:border-blue-200 cursor-pointer transition-all group">
                            <input type="radio" name="q1" class="w-5 h-5 text-blue-600 focus:ring-blue-500">
                            <span class="ml-4 text-slate-700 font-medium group-hover:text-blue-900">M20</span>
                        </label>
                        <label class="flex items-center p-4 border-2 border-slate-100 rounded-xl hover:bg-blue-50 hover:border-blue-200 cursor-pointer transition-all group">
                            <input type="radio" name="q1" class="w-5 h-5 text-blue-600 focus:ring-blue-500">
                            <span class="ml-4 text-slate-700 font-medium group-hover:text-blue-900">M30</span>
                        </label>
                        <label class="flex items-center p-4 border-2 border-blue-600 bg-blue-50 rounded-xl cursor-pointer transition-all">
                            <input type="radio" name="q1" checked class="w-5 h-5 text-blue-600 focus:ring-blue-500">
                            <span class="ml-4 text-blue-900 font-bold">M40</span>
                        </label>
                        <label class="flex items-center p-4 border-2 border-slate-100 rounded-xl hover:bg-blue-50 hover:border-blue-200 cursor-pointer transition-all group">
                            <input type="radio" name="q1" class="w-5 h-5 text-blue-600 focus:ring-blue-500">
                            <span class="ml-4 text-slate-700 font-medium group-hover:text-blue-900">M50</span>
                        </label>
                    </div>
                </div>

                <div class="bg-slate-50 p-6 border-t border-slate-200 flex justify-between items-center">
                    <button class="text-slate-500 hover:text-slate-800 font-bold flex items-center gap-2">
                        <i class="fas fa-chevron-left"></i> Previous
                    </button>
                    <div class="flex gap-2">
                        <button class="bg-orange-100 text-orange-700 px-4 py-2 rounded-lg font-bold text-sm hover:bg-orange-200">
                            <i class="fas fa-bookmark"></i> MARK FOR REVIEW
                        </button>
                        <button class="bg-blue-700 text-white px-8 py-2 rounded-lg font-bold hover:bg-blue-800 shadow-lg flex items-center gap-2">
                            SAVE & NEXT <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <aside class="w-full md:w-80 bg-white border-l border-slate-200 flex flex-col">
            <div class="p-6">
                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Question Palette</h4>
                <div class="grid grid-cols-5 gap-2 overflow-y-auto max-h-96 md:max-h-none">
                    <button class="w-10 h-10 rounded bg-green-600 text-white text-xs font-bold">1</button>
                    <button class="w-10 h-10 rounded bg-slate-100 text-slate-400 text-xs font-bold">2</button>
                    <button class="w-10 h-10 rounded bg-orange-500 text-white text-xs font-bold">3</button>
                    <button class="w-10 h-10 rounded border-2 border-blue-600 text-blue-600 text-xs font-bold">4</button>
                    <script>
                        for(let i=5; i<=120; i++) {
                            document.write(`<button class="w-10 h-10 rounded bg-slate-100 text-slate-400 text-xs font-bold">${i}</button>`);
                        }
                    </script>
                </div>
            </div>
            
            <div class="mt-auto p-6 bg-slate-50 border-t border-slate-200 grid grid-cols-2 gap-4 text-xs font-bold">
                <div class="flex items-center gap-2"><span class="w-3 h-3 bg-green-600 rounded-full"></span> 1 Answered</div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 bg-orange-500 rounded-full"></span> 1 Review</div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 bg-slate-300 rounded-full"></span> 118 Not Visited</div>
            </div>
        </aside>
    </main>

    <script>
        // Disable Right Click
        document.addEventListener('contextmenu', event => event.preventDefault());
        
        function confirmSubmit() {
    if(confirm("Are you sure you want to end the test?")) {
        let correctCount = 0;
        let incorrectCount = 0;
        let subjectScores = { "Civil": 0, "GK": 0, "Hindi": 0 };

        selectedQuestions.forEach((q, index) => {
            const studentAns = studentAnswers[index];
            if (studentAns !== undefined) {
                if (studentAns === q.answer) {
                    correctCount++;
                    subjectScores[q.subject] += 1;
                } else {
                    incorrectCount++;
                    subjectScores[q.subject] -= 0.33; // Apply Rajasthan 1/3 negative marking
                }
            }
        });

        const totalMarks = (correctCount * 1) - (incorrectCount * 0.33);

        // Save data to browser memory
        const report = {
            total: totalMarks.toFixed(2),
            correct: correctCount,
            incorrect: incorrectCount,
            skipped: selectedQuestions.length - (correctCount + incorrectCount),
            subjects: subjectScores
        };
        
        localStorage.setItem('lastTestResult', JSON.stringify(report));
        window.location.href = "result.html";
    }
}
    </script>
</body>
</html>
