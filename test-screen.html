<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Examination | Competition Plus</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], processEscapes: true },
            options: { enableMenu: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        :root { --primary-blue: #2563eb; --slate-800: #1e293b; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
        }

        /* Question Layout */
        #question-container { min-height: 180px; position: relative; }
        #question-content, .option-text { 
            font-size: 1.125rem !important; 
            line-height: 1.7; 
            color: var(--slate-800); 
            font-weight: 500; 
        }
        #question-content { white-space: pre-wrap; word-wrap: break-word; transition: opacity 0.2s ease; }

        /* Skeleton Loading */
        .loading #question-content { opacity: 0; }
        .loading::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 24px;
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; border-radius: 4px;
        }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Palette Styling */
        .q-node { 
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; 
            font-size: 0.75rem; font-weight: 700; border-radius: 6px; cursor: pointer; 
            transition: all 0.2s ease; border: 2px solid transparent; 
        }
        .q-active { border-color: var(--primary-blue) !important; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
        
        aside.collapsed { width: 0; overflow: hidden; border-left-width: 0; }
        .no-select { user-select: none; -webkit-user-select: none; }
        .modal-open { overflow: hidden; }
        #sidebar-scroll::-webkit-scrollbar { width: 5px; }
        #sidebar-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>

<body class="h-screen flex flex-col overflow-hidden no-select">

    <header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-8 z-30 shadow-sm">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="text-slate-400 hover:text-blue-600 p-1">
                <i class="fas fa-bars-staggered text-lg"></i>
            </button>
            <div class="bg-blue-600 p-1.5 rounded-lg shadow-sm"><i class="fas fa-graduation-cap text-white"></i></div>
            <h1 class="font-bold text-slate-800 tracking-tight text-sm md:text-base flex items-center gap-2 uppercase">
                <span>Competition <span class="text-blue-600">Plus</span></span>
                <span id="test-title-display" class="text-slate-500 font-semibold lowercase first-letter:uppercase ml-2">Loading...</span>
            </h1>
        </div>
        <div class="flex items-center gap-4 bg-slate-100 px-4 py-1.5 rounded-full border border-slate-200">

            <span id="timer" class="font-mono font-bold text-slate-700 tabular-nums text-lg">00:00:00</span>

            <i class="fas fa-flag-checkered mr-2 opacity-70"></i>Finish Test

    </header>

                                Question 01
                            </span>
                            <div class="h-5 w-[1.5px] bg-slate-300 rounded-full mx-1"></div>
                            <span id="subject-tag" class="text-slate-500 text-[11px] font-bold uppercase tracking-widest">General</span>
                        </div>
                        <div class="flex bg-slate-200/50 rounded-lg p-1">

                    <div class="p-6 md:p-12 flex-1">

                    <div class="p-4 bg-slate-50 border-t border-slate-200 flex flex-wrap gap-3 items-center justify-between">

                        <div class="flex gap-2">

                            <button onclick="markReview()" class="px-4 py-2 bg-purple-50 border border-purple-200 text-purple-600 rounded-lg text-xs font-bold hover:bg-purple-100 transition">MARK FOR REVIEW</button>
                            <button onclick="saveAndNext()" class="px-8 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 shadow-lg flex items-center gap-2 transition-all active:scale-95">
                                SAVE & NEXT <i class="fas fa-chevron-right text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <aside id="sidebar" class="w-80 bg-white border-l border-slate-200 flex flex-col transition-all duration-300">
            <div class="p-5 border-b border-slate-100 flex items-center gap-4">
                <div class="relative">
                    <img src="https://ui-avatars.com/api/?name=Aspirant&background=0D8ABC&color=fff" class="w-12 h-12 rounded-xl border border-slate-200" alt="Profile">
                    <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-white rounded-full flex items-center justify-center shadow-sm">
                        <div class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></div>
                    </div>
                </div>
                <div>
                    <h4 class="font-bold text-slate-800 text-sm">Official Aspirant</h4>
                    <p class="text-[10px] text-slate-500 font-medium tracking-wide uppercase flex items-center gap-1.5">
                        <span class="h-1.5 w-1.5 rounded-full bg-green-500"></span>Live Session
                    </p>
                </div>
            </div>
            
            <div id="sidebar-scroll" class="flex-1 overflow-y-auto p-5">
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4">Question Palette</p>
                <div id="palette-grid" class="grid grid-cols-5 gap-3"></div>
            </div>

            <div class="p-4 border-t bg-slate-50/50">
                <div class="grid grid-cols-2 gap-2">
                    <div class="flex items-center gap-2 bg-white p-2 rounded-lg border border-slate-200">
                        <div class="w-5 h-5 bg-green-500 rounded flex items-center justify-center text-[10px] text-white font-bold" id="leg-answered">0</div>
                        <span class="text-[10px] font-bold text-slate-600 uppercase">Answered</span>

                        <div class="w-5 h-5 bg-white border border-slate-300 rounded flex items-center justify-center text-[10px] text-slate-400 font-bold" id="leg-not-visited">0</div>

                </div>

                    <div class="relative w-5 h-5 bg-purple-600 rounded flex items-center justify-center text-[10px] text-white font-bold">
                        <span id="leg-marked-answered">0</span>
                        <div class="absolute -top-1 -right-1 w-2 h-2 bg-green-400 rounded-full border border-white"></div>
                    </div>
                    <span class="text-[10px] font-bold text-purple-700 uppercase">Marked & Answered</span>
                </div>
            </div>
        </aside>
    </main>

    <div id="submit-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-lg w-full overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="bg-slate-50 px-6 py-5 border-b border-slate-100 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center"><i class="fas fa-file-export"></i></div>
                    <div>
                        <h3 class="text-lg font-bold text-slate-800">Exam Summary</h3>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Final Review</p>
                    </div>
                </div>

            </div>
            <div class="p-6">
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <div class="bg-slate-50 p-3 rounded-2xl text-center"><p class="text-[9px] font-black uppercase text-slate-400">Total</p><p id="modal-total" class="text-2xl font-black">0</p></div>
                    <div class="bg-green-50 p-3 rounded-2xl text-center"><p class="text-[9px] font-black uppercase text-green-600">Ans</p><p id="modal-answered" class="text-2xl font-black text-green-700">0</p></div>
                    <div class="bg-red-50 p-3 rounded-2xl text-center"><p class="text-[9px] font-black uppercase text-red-600">Not Ans</p><p id="modal-not-answered" class="text-2xl font-black text-red-700">0</p></div>
                    <div class="bg-purple-50 p-3 rounded-2xl text-center"><p class="text-[9px] font-black uppercase text-purple-600">Marked</p><p id="modal-marked" class="text-2xl font-black text-purple-700">0</p></div>
                    <div class="bg-indigo-50 p-3 rounded-2xl text-center"><p class="text-[9px] font-black uppercase text-indigo-600">M+A</p><p id="modal-marked-ans" class="text-2xl font-black text-indigo-700">0</p></div>
                    <div class="bg-slate-100 p-3 rounded-2xl text-center"><p class="text-[9px] font-black uppercase text-slate-500">Not Vis</p><p id="modal-not-visited" class="text-2xl font-black text-slate-600">0</p></div>
                </div>
                <div id="modal-warning" class="hidden p-4 bg-amber-50 border border-amber-200 rounded-2xl mb-6">
                    <p class="text-sm font-bold text-amber-900">Wait! You missed some questions.</p>
                </div>
                <div class="flex gap-3">
                    <button id="modal-resume-btn" onclick="closeModal()" class="flex-1 py-3 text-xs font-bold bg-slate-100 rounded-xl">RESUME</button>
                    <button id="modal-confirm-btn" onclick="finalSubmit()" class="flex-1 py-3 text-xs font-bold bg-blue-600 text-white rounded-xl shadow-lg">CONFIRM SUBMIT</button>
                </div>
            </div>
        </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAl9iSJhwn5IAUCA5LrgPK5FzFZPtWNZo",
            authDomain: "competition-plus-9996b.firebaseapp.com",
            projectId: "competition-plus-9996b",
            databaseURL: "https://competition-plus-9996b-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();

        // Application State
        let allQuestions = [], currentIndex = 0, currentLang = 'en', timerRunning = false;
        let testId = new URLSearchParams(window.location.search).get('testId');
        
        const State = {
            save: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
            load: (key, def) => JSON.parse(localStorage.getItem(key)) || def,
            answers: {}, reviews: {}, visited: {}, timeSpent: []
        };

        const DOM = {
            container: document.getElementById("question-container"),
            content: document.getElementById("question-content"),
            badge: document.getElementById("q-number-badge"),
            grid: document.getElementById("options-grid"),
            palette: document.getElementById("palette-grid"),
            subject: document.getElementById("subject-tag"),
            timer: document.getElementById("timer"),
            title: document.getElementById('test-title-display'),
            legend: {
                ans: document.getElementById("leg-answered"),
                na: document.getElementById("leg-not-answered"),
                nv: document.getElementById("leg-not-visited"),
                m: document.getElementById("leg-marked"),
                ma: document.getElementById("leg-marked-answered")
            }
        };

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        async function loadTestData() {
            try {
                if (!testId) {
                    const snap = await rtdb.ref('current_active_test').once('value');
                    testId = snap.val();
                }
                DOM.title.innerText = testId.split('_').join(' ');
                
                const snapshot = await rtdb.ref(testId).once('value');
                const dataArray = Object.values(snapshot.val());

                // Group bi-lingual questions
                const grouped = {};
                dataArray.forEach(item => {
                    const qid = item.questionID;
                    if (!grouped[qid]) grouped[qid] = { en: null, hi: null };
                    const isHindi = /[\u0900-\u097F]/.test(item.questionText || item.explanation);
                    isHindi ? grouped[qid].hi = item : grouped[qid].en = item;
                });

                allQuestions = Object.values(grouped);
                
                // Shuffle logic
                let savedOrder = State.load('cp_question_order', null);
                if (savedOrder) {
                    allQuestions = savedOrder.map(id => allQuestions.find(p => (p.en || p.hi).questionID === id));
                } else {
                    shuffleArray(allQuestions);
                    State.save('cp_question_order', allQuestions.map(p => (p.en || p.hi).questionID));
                }

                // Initialize Persisted State
                State.answers = State.load('cp_answers', {});
                State.reviews = State.load('cp_reviews', {});
                State.visited = State.load('cp_visited', {});
                State.timeSpent = State.load('cp_time_spent', new Array(allQuestions.length).fill(0));
                
                let timeInSec = parseInt(localStorage.getItem('cp_timer')) || (allQuestions.length * 60);
                window.timeInSeconds = timeInSec;

                renderQuestion();
                startTimer();
                updatePalette();
            } catch (e) { console.error("Initialization Error:", e); }
        }

        function renderQuestion() {
            const pair = allQuestions[currentIndex];
            if (!pair) return;
            const q = (currentLang === 'hi' && pair.hi) ? pair.hi : pair.en;
            
            DOM.container.classList.add('loading');
            State.visited[currentIndex] = true;
            State.save('cp_visited', State.visited);

            // Badge styling
            const isAns = State.answers[currentIndex] !== undefined;
            const isMarked = State.reviews[currentIndex];
            let dot = '', cls = "bg-slate-800";

            if (isMarked) {
                cls = "bg-purple-600 shadow-md";
                if (isAns) dot = '<div class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-green-400 border-2 border-white rounded-full"></div>';
            } else if (isAns) {
                cls = "bg-green-500 shadow-md";
            }

            DOM.badge.className = `relative text-white px-3.5 py-1.5 rounded-md text-[12px] font-bold uppercase tracking-widest transition-all ${cls}`;
            DOM.badge.innerHTML = `Question ${String(currentIndex + 1).padStart(2, '0')}${dot}`;
            DOM.subject.innerText = q.subject || "General";
            
            const imgHtml = q.questionImage ? `<img src="${q.questionImage}" class="max-h-64 mx-auto mb-4 rounded-lg shadow-sm">` : '';
            DOM.content.innerHTML = imgHtml + q.questionText;

            // Option Shuffling
            if (!pair.shuffledOptions) {
                pair.shuffledOptions = shuffleArray(q.options.map((text, i) => ({ text, originalIndex: i })));
            }

            DOM.grid.innerHTML = pair.shuffledOptions.map((opt, idx) => {
                const sel = State.answers[currentIndex] === opt.originalIndex;
                return `
                    <div onclick="selectOption(${idx})" class="group p-4 border-2 rounded-xl cursor-pointer flex items-center justify-between transition-all ${sel ? 'border-blue-500 bg-blue-50 shadow-md scale-[1.02]' : 'border-slate-100 hover:border-slate-300 hover:bg-slate-50'}">
                        <div class="flex items-center gap-4">
                            <div class="w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm ${sel ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500'}">${String.fromCharCode(65 + idx)}</div>
                            <div class="option-text text-sm md:text-base">${opt.text}</div>
                        </div>
                        ${sel ? '<div class="text-blue-600 animate-in fade-in zoom-in duration-200"><i class="fas fa-circle-check text-xl"></i></div>' : ''}
                    </div>`;
            }).join('');
            
            if (window.MathJax) {
                MathJax.typesetPromise([DOM.content, DOM.grid]).finally(() => DOM.container.classList.remove('loading'));
            } else {
                DOM.container.classList.remove('loading');
            }
        }

        function updatePalette() {
            const frag = document.createDocumentFragment();
            let c = { ans: 0, m: 0, ma: 0, nv: 0, na: 0 };

            allQuestions.forEach((_, i) => {
                const isAns = State.answers[i] !== undefined, isMark = State.reviews[i], isVis = State.visited[i];
                let cls = "bg-white text-slate-400 border-slate-200", dot = "";

                if (isMark && isAns) { cls = "bg-purple-600 text-white shadow-lg"; dot = '<div class="absolute -top-0.5 -right-0.5 w-2 h-2 bg-green-400 rounded-full border border-purple-600"></div>'; c.ma++; }
                else if (isMark) { cls = "bg-purple-600 text-white shadow-lg"; c.m++; }
                else if (isAns) { cls = "bg-green-500 text-white shadow-lg"; c.ans++; }
                else if (isVis) { cls = "bg-red-500 text-white"; c.na++; }
                else c.nv++;

                const btn = document.createElement("div");
                btn.className = `q-node relative ${cls} ${i === currentIndex ? 'q-active' : ''}`;
                btn.innerHTML = `<span>${i + 1}</span>${dot}`;
                btn.onclick = () => { currentIndex = i; renderQuestion(); updatePalette(); };
                frag.appendChild(btn);
            });

            DOM.palette.innerHTML = ""; DOM.palette.appendChild(frag);
            Object.keys(c).forEach(k => { if(DOM.legend[k]) DOM.legend[k].innerText = c[k]; });
        }

        function selectOption(viewIdx) { 
            State.answers[currentIndex] = allQuestions[currentIndex].shuffledOptions[viewIdx].originalIndex; 
            State.save('cp_answers', State.answers); 
            renderQuestion(); updatePalette(); 
        }

        function saveAndNext() { delete State.reviews[currentIndex]; State.save('cp_reviews', State.reviews); move(1); }
        function markReview() { State.reviews[currentIndex] = true; State.save('cp_reviews', State.reviews); move(1); }
        function move(dir) { const t = currentIndex + dir; if (t >= 0 && t < allQuestions.length) { currentIndex = t; renderQuestion(); updatePalette(); } }
        function clearResponse() { delete State.answers[currentIndex]; delete State.reviews[currentIndex]; State.save('cp_answers', State.answers); State.save('cp_reviews', State.reviews); renderQuestion(); updatePalette(); }
        
        function startTimer() {
            if (timerRunning) return; timerRunning = true;
            const ticker = setInterval(() => {
                if (window.timeInSeconds <= 0) { 
                    clearInterval(ticker); confirmSubmit(true); return; 
                }
                window.timeInSeconds--;
                localStorage.setItem('cp_timer', window.timeInSeconds);
                
                // Track time per question
                State.timeSpent[currentIndex]++;
                State.save('cp_time_spent', State.timeSpent);

                const h = Math.floor(window.timeInSeconds / 3600), m = Math.floor((window.timeInSeconds % 3600) / 60), s = window.timeInSeconds % 60;
                DOM.timer.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }

        function confirmSubmit(isTimeOver = false) {
            const stats = {
                total: allQuestions.length,
                ans: parseInt(DOM.legend.ans.innerText),
                na: parseInt(DOM.legend.na.innerText),
                nv: parseInt(DOM.legend.nv.innerText),
                m: parseInt(DOM.legend.m.innerText),
                ma: parseInt(DOM.legend.ma.innerText)
            };
            
            document.getElementById('modal-total').innerText = stats.total;
            document.getElementById('modal-answered').innerText = stats.ans;
            document.getElementById('modal-not-answered').innerText = stats.na;
            document.getElementById('modal-marked').innerText = stats.m;
            document.getElementById('modal-marked-ans').innerText = stats.ma;
            document.getElementById('modal-not-visited').innerText = stats.nv;

            const warn = document.getElementById('modal-warning');
            const resBtn = document.getElementById('modal-resume-btn');
            const subBtn = document.getElementById('modal-confirm-btn');

            if (isTimeOver) {
                DOM.grid.style.pointerEvents = 'none';
                DOM.container.style.opacity = '0.6';
                warn.classList.remove('hidden');
                warn.innerHTML = `<p class="text-sm font-bold text-red-900">Time is over! Redirecting to results...</p>`;
                resBtn.classList.add('hidden');
                subBtn.innerText = "VIEW RESULTS";
            } else {
                warn.classList.toggle('hidden', (stats.ans + stats.ma) >= stats.total);
            }

            document.getElementById('submit-modal').classList.remove('hidden');
            document.body.classList.add('modal-open');
        }

        function finalSubmit() {
            const report = allQuestions.map((p, i) => {
                const q = p.en || p.hi;
                const userChoice = State.answers[i];
                const correct = parseInt(q.correctIndex ?? q.correct);
                return { pair: p, userSelectedIndex: userChoice, isCorrect: userChoice === correct, timeSpent: State.timeSpent[i] };
            });

            const correct = report.filter(r => r.userSelectedIndex !== undefined && r.isCorrect).length;
            const wrong = report.filter(r => r.userSelectedIndex !== undefined && !r.isCorrect).length;
            const score = Math.max(0, correct - (wrong / 3)).toFixed(2);
            
            localStorage.setItem('detailedTestReport', JSON.stringify(report));
            localStorage.setItem('lastTestResult', JSON.stringify({ testName: DOM.title.innerText, totalQuestions: allQuestions.length, correct, incorrect: wrong, total: parseFloat(score) }));

            ['cp_answers', 'cp_reviews', 'cp_visited', 'cp_timer', 'cp_time_spent', 'cp_question_order'].forEach(k => localStorage.removeItem(k));
            window.location.href = "result.html";
        }

        // Global UI toggles
        function closeModal() { document.getElementById('submit-modal').classList.add('hidden'); document.body.classList.remove('modal-open'); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
        function setLanguage(l) { currentLang = l; renderQuestion(); updatePalette(); }

        // Security
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === "F12" || (e.ctrlKey && ['i','j','c','u','s','p'].includes(e.key.toLowerCase()))) e.preventDefault();
        });

        loadTestData();
    </script>
</body>
</html>
