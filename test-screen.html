<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Mock Test | Competition Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-select { user-select: none; }
        #palette-container::-webkit-scrollbar { width: 4px; }
        #palette-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .selected-q {
            box-shadow: 0 0 0 2px white, 0 0 0 4px #1d4ed8 !important;
            transform: scale(1.05);
            z-index: 10;
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col overflow-hidden no-select">

    <nav class="bg-slate-900 text-white px-6 py-3 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold border-r border-slate-700 pr-4">Competition <span class="text-blue-400">Plus</span></h1>
            <span id="test-title" class="text-sm text-slate-400 hidden md:inline">Full Length Mock Test</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2 bg-slate-800 px-4 py-1.5 rounded-full border border-slate-700">
                <i class="fas fa-clock text-blue-400"></i>
                <span id="timer" class="font-mono text-lg font-bold">--:--:--</span>
            </div>
            <button onclick="confirmSubmit()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-1.5 rounded-lg font-bold transition">SUBMIT TEST</button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col min-h-[550px]">
                <div class="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <span id="q-number-badge" class="bg-blue-700 text-white px-3 py-1 rounded text-xs font-bold uppercase">Question 1</span>
                        <span id="subject-tag" class="bg-slate-200 text-slate-600 px-3 py-1 rounded text-xs font-bold uppercase tracking-wider">Loading...</span>
                    </div>
                </div>

                <div class="p-6 md:p-10 flex-1">
                    <p id="question-display" class="text-lg md:text-xl text-slate-800 font-semibold mb-8 leading-relaxed">Loading questions...</p>
                    <div id="options-display" class="space-y-4"></div>
                </div>

                <div class="bg-slate-50 p-6 border-t border-slate-200 flex justify-between items-center">
                    <button onclick="prevQuestion()" class="text-slate-500 hover:text-slate-800 font-bold flex items-center gap-2"><i class="fas fa-chevron-left"></i> Previous</button>
                    <div class="flex gap-2">
                        <button onclick="clearResponse()" class="bg-white border border-slate-200 text-slate-500 px-4 py-2 rounded-lg font-bold text-sm hover:bg-slate-100">CLEAR</button>
                        <button onclick="markReview()" class="bg-orange-100 text-orange-700 px-4 py-2 rounded-lg font-bold text-sm hover:bg-orange-200">REVIEW</button>
                        <button onclick="saveAndNext()" class="bg-blue-700 text-white px-8 py-2 rounded-lg font-bold hover:bg-blue-800 shadow-lg flex items-center gap-2 transition">SAVE & NEXT <i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <aside class="w-full md:w-80 bg-white border-l border-slate-200 flex flex-col">
            <div class="p-6 flex-1 overflow-hidden flex flex-col">
                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Question Palette</h4>
                <div id="palette-container" class="grid grid-cols-5 gap-2 overflow-y-auto pr-2 mb-4"></div>
            </div>
            
            <div class="p-6 bg-slate-50 border-t border-slate-200 grid grid-cols-2 gap-4 text-xs font-bold">
                <div class="flex items-center gap-2"><span class="w-3 h-3 bg-green-600 rounded-full"></span> <span id="stat-answered">0</span> Answered</div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 bg-orange-500 rounded-full"></span> <span id="stat-review">0</span> Review</div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 bg-slate-300 rounded-full"></span> <span id="stat-not-visited">0</span> Not Visited</div>
            </div>
        </aside>
    </main>

    <div id="submitModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden">
            <div class="p-6 text-center">
                <h3 class="text-xl font-bold text-slate-900 mb-2">Submit Test?</h3>
                <p class="text-slate-500 text-sm">Review your answers before final submission.</p>
            </div>
            <div class="bg-slate-50 p-4 flex gap-3">
                <button onclick="closeModal()" class="flex-1 px-4 py-2 bg-white border text-slate-700 font-bold rounded-lg">CANCEL</button>
                <button onclick="processSubmit()" class="flex-1 px-4 py-2 bg-blue-700 text-white font-bold rounded-lg">SUBMIT</button>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "competition-plus-9996b.firebaseapp.com",
            databaseURL: "https://competition-plus-9996b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "competition-plus-9996b",
            storageBucket: "competition-plus-9996b.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const DB_URL = "https://competition-plus-9996b-default-rtdb.asia-southeast1.firebasedatabase.app/questions.json";
        
        let allQuestions = [];
        let currentIndex = 0;
        let studentAnswers = JSON.parse(localStorage.getItem('cp_answers')) || {}; 
        let reviewList = JSON.parse(localStorage.getItem('cp_reviews')) || {}; 
        let visitedList = JSON.parse(localStorage.getItem('cp_visited')) || {}; 
        let timeSpentPerQ = JSON.parse(localStorage.getItem('cp_time_spent')) || {};
        let timeInSeconds = parseInt(localStorage.getItem('cp_timer')) || 120 * 60; 
        let lastTime = Date.now();

        async function loadTestData() {
            const response = await fetch(DB_URL);
            const data = await response.json();
            allQuestions = Object.values(data);
            if(allQuestions.length > 0) {
                renderQuestion();
                startTimer();
                updatePalette();
            }
        }

        function renderQuestion() {
            logTime();
            const q = allQuestions[currentIndex];
            visitedList[currentIndex] = true;
            localStorage.setItem('cp_visited', JSON.stringify(visitedList));

            document.getElementById("q-number-badge").innerText = `Question ${currentIndex + 1}`;
            document.getElementById("subject-tag").innerText = q.subject || "General Engineering";
            document.getElementById("question-display").innerText = q.questionText;

            const oDisplay = document.getElementById("options-display");
            oDisplay.innerHTML = "";
            q.options.forEach((opt, index) => {
                const isSelected = studentAnswers[currentIndex] === index;
                const btn = document.createElement("label");
                btn.className = `flex items-center p-4 border-2 rounded-xl cursor-pointer transition-all ${isSelected ? 'border-blue-600 bg-blue-50' : 'border-slate-100 hover:bg-blue-50'}`;
                btn.innerHTML = `<input type="radio" name="option" class="w-5 h-5" ${isSelected ? 'checked' : ''} onchange="recordAnswer(${index})"><span class="ml-4 font-medium">${opt}</span>`;
                oDisplay.appendChild(btn);
            });
            updatePalette();
        }

        function logTime() {
            const now = Date.now();
            const diff = Math.floor((now - lastTime) / 1000);
            timeSpentPerQ[currentIndex] = (timeSpentPerQ[currentIndex] || 0) + diff;
            localStorage.setItem('cp_time_spent', JSON.stringify(timeSpentPerQ));
            lastTime = now;
        }

        function recordAnswer(index) {
            studentAnswers[currentIndex] = index;
            localStorage.setItem('cp_answers', JSON.stringify(studentAnswers));
        }

        function clearResponse() {
            delete studentAnswers[currentIndex];
            localStorage.setItem('cp_answers', JSON.stringify(studentAnswers));
            renderQuestion();
        }

        function markReview() {
            reviewList[currentIndex] = !reviewList[currentIndex];
            localStorage.setItem('cp_reviews', JSON.stringify(reviewList));
            nextQuestion();
        }

        function saveAndNext() {
            if (studentAnswers[currentIndex] !== undefined) {
                delete reviewList[currentIndex];
                localStorage.setItem('cp_reviews', JSON.stringify(reviewList));
            }
            nextQuestion();
        }

        function nextQuestion() {
            if (currentIndex < allQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function updatePalette() {
            const palette = document.getElementById("palette-container");
            palette.innerHTML = "";
            let ans = 0, rev = 0, nv = 0;

            allQuestions.forEach((_, i) => {
                let status = "bg-slate-100 text-slate-400";
                if (reviewList[i]) { status = "bg-orange-500 text-white"; rev++; }
                else if (studentAnswers[i] !== undefined) { status = "bg-green-600 text-white"; ans++; }
                else if (visitedList[i]) { status = "bg-slate-300 text-slate-600"; }
                else { nv++; }

                const btn = document.createElement("button");
                btn.className = `w-10 h-10 rounded text-xs font-bold transition-all ${status} ${i === currentIndex ? 'selected-q' : ''}`;
                btn.innerText = i + 1;
                btn.onclick = () => { currentIndex = i; renderQuestion(); };
                palette.appendChild(btn);
            });

            document.getElementById("stat-answered").innerText = ans;
            document.getElementById("stat-review").innerText = rev;
            document.getElementById("stat-not-visited").innerText = nv;
        }

        function startTimer() {
            setInterval(() => {
                if (timeInSeconds <= 0) processSubmit();
                const h = Math.floor(timeInSeconds / 3600);
                const m = Math.floor((timeInSeconds % 3600) / 60);
                const s = timeInSeconds % 60;
                document.getElementById('timer').innerText = `${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
                timeInSeconds--;
                if (timeInSeconds % 10 === 0) localStorage.setItem('cp_timer', timeInSeconds);
            }, 1000);
        }

        function confirmSubmit() { document.getElementById('submitModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('submitModal').classList.add('hidden'); }

        async function processSubmit() {
            logTime();
            const report = allQuestions.map((q, i) => ({
                ...q,
                userAnswer: studentAnswers[i],
                isCorrect: studentAnswers[i] === q.correctIndex,
                isVisited: visitedList[i] || false,
                timeSpent: timeSpentPerQ[i] || 0
            }));

            const correct = report.filter(q => q.userAnswer !== undefined && q.isCorrect).length;
            const incorrect = report.filter(q => q.userAnswer !== undefined && !q.isCorrect).length;
            const finalScore = parseFloat(((correct * 1) - (incorrect * 0.33)).toFixed(2));

            localStorage.setItem('detailedTestReport', JSON.stringify(report));
            localStorage.setItem('lastTestResult', JSON.stringify({
                total: finalScore,
                correct, incorrect, totalQ: allQuestions.length
            }));

            // --- LEADERBOARD PUSH ---
            try {
                await db.collection("leaderboard").add({
                    name: localStorage.getItem('userName') || "Aspirant",
                    score: finalScore,
                    accuracy: Math.round((correct / (correct + incorrect)) * 100) || 0,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch (e) { console.error("Leaderboard Error:", e); }

            window.location.href = "result.html";
        }

        loadTestData();
    </script>
</body>
</html>
