<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Mock Test | Competition Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-select { user-select: none; }
        #palette-container::-webkit-scrollbar { width: 4px; }
        #palette-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .selected-q {
            box-shadow: 0 0 0 2px white, 0 0 0 4px #1d4ed8 !important;
            transform: scale(1.05);
            z-index: 10;
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col overflow-hidden no-select">

    <nav class="bg-slate-900 text-white px-6 py-3 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold border-r border-slate-700 pr-4 uppercase tracking-tight">Competition <span class="text-blue-400">Plus</span></h1>
            <span id="test-title" class="text-sm text-slate-400 hidden md:inline">Loading Test Title...</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2 bg-slate-800 px-4 py-1.5 rounded-full border border-slate-700">
                <i class="fas fa-clock text-blue-400"></i>
                <span id="timer" class="font-mono text-lg font-bold">--:--:--</span>
            </div>
            <button onclick="confirmSubmit()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-1.5 rounded-lg font-bold transition">SUBMIT TEST</button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col min-h-[550px]">
                <div class="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <span id="q-number-badge" class="bg-blue-700 text-white px-3 py-1 rounded text-xs font-bold uppercase">Question</span>
                        <span id="subject-tag" class="bg-slate-200 text-slate-600 px-3 py-1 rounded text-xs font-bold uppercase tracking-wider">Loading...</span>
                    </div>
                </div>

                <div class="p-6 md:p-10 flex-1">
                    <div id="question-display" class="text-lg md:text-xl text-slate-800 font-semibold mb-8 leading-relaxed">Loading questions...</div>
                    <div id="options-display" class="space-y-4"></div>
                </div>

                <div class="bg-slate-50 p-6 border-t border-slate-200 flex justify-between items-center">
                    <button onclick="prevQuestion()" class="text-slate-500 hover:text-slate-800 font-bold flex items-center gap-2 transition"><i class="fas fa-chevron-left"></i> Previous</button>
                    <div class="flex gap-2">
                        <button onclick="clearResponse()" class="bg-white border border-slate-200 text-slate-500 px-4 py-2 rounded-lg font-bold text-sm hover:bg-slate-100 transition">CLEAR</button>
                        <button onclick="markReview()" class="bg-orange-100 text-orange-700 px-4 py-2 rounded-lg font-bold text-sm hover:bg-orange-200 transition">REVIEW</button>
                        <button onclick="saveAndNext()" class="bg-blue-700 text-white px-8 py-2 rounded-lg font-bold hover:bg-blue-800 shadow-lg flex items-center gap-2 transition">SAVE & NEXT <i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <aside class="w-full md:w-80 bg-white border-l border-slate-200 flex flex-col">
            <div class="p-6 flex-1 overflow-hidden flex flex-col">
                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Question Palette</h4>
                <div id="palette-container" class="grid grid-cols-5 gap-2 overflow-y-auto pr-2 mb-4"></div>
            </div>
            
            <div class="p-6 bg-slate-50 border-t border-slate-200 grid grid-cols-2 gap-4 text-xs font-bold">
                <div class="flex items-center gap-2"><span class="w-3 h-3 bg-green-600 rounded-full"></span> <span id="stat-answered">0</span> Answered</div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 bg-orange-500 rounded-full"></span> <span id="stat-review">0</span> Review</div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 bg-slate-300 rounded-full"></span> <span id="stat-not-visited">0</span> Visited</div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 bg-slate-100 border rounded-full"></span> <span id="stat-not-visited-total">0</span> Not Visited</div>
            </div>
        </aside>
    </main>

    <div id="submitModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full overflow-hidden transform transition-all scale-100">
            <div class="p-8 text-center">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-file-signature text-2xl"></i>
                </div>
                <h3 class="text-2xl font-bold text-slate-900 mb-2">Submit Test?</h3>
                <p class="text-slate-500 font-medium">Your score will be saved to the Rajasthan leaderboard.</p>
            </div>
            <div class="p-6 pt-0 flex gap-4">
                <button onclick="closeModal()" class="flex-1 px-6 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition">CANCEL</button>
                <button id="finalSubmitBtn" onclick="processSubmit()" class="flex-1 px-6 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition">SUBMIT</button>
            </div>
        </div>
    </div>

    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] }
        };

        const firebaseConfig = {
            apiKey: "AIzaSyCAl9iSJhwn5IAUCA5LrgPK5FzFZPtWNZo",
            authDomain: "competition-plus-9996b.firebaseapp.com",
            projectId: "competition-plus-9996b",
            storageBucket: "competition-plus-9996b.firebasestorage.app",
            messagingSenderId: "49252651907",
            appId: "1:49252651907:web:8a5162064aaf3e69bd1cb6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allQuestions = [];
        let currentIndex = 0;
        let studentAnswers = JSON.parse(localStorage.getItem('cp_answers')) || {}; 
        let reviewList = JSON.parse(localStorage.getItem('cp_reviews')) || {}; 
        let visitedList = JSON.parse(localStorage.getItem('cp_visited')) || {}; 
        let timeSpentPerQ = JSON.parse(localStorage.getItem('cp_time_spent')) || {};
        
        // Timer will be initialized dynamically in loadTestData
        let timeInSeconds = parseInt(localStorage.getItem('cp_timer')); 
        let lastTime = Date.now();

        async function loadTestData() {
            try {
                const activeRes = await fetch("https://competition-plus-9996b-default-rtdb.asia-southeast1.firebasedatabase.app/current_active_test.json");
                const activeNode = await activeRes.json();
                const response = await fetch(`https://competition-plus-9996b-default-rtdb.asia-southeast1.firebasedatabase.app/${activeNode}.json`);
                const data = await response.json();
                
                allQuestions = Array.isArray(data) ? data : Object.values(data);
                document.getElementById("test-title").innerText = activeNode.replace(/_/g, ' ').toUpperCase();

                if(allQuestions.length > 0) {
                    // Logic: If no saved timer exists, assign 1 minute (60s) per question
                    if (!timeInSeconds || isNaN(timeInSeconds)) {
                        timeInSeconds = allQuestions.length * 60; 
                        localStorage.setItem('cp_timer', timeInSeconds);
                    }
                    
                    renderQuestion();
                    startTimer();
                    updatePalette();
                }
            } catch (e) { console.error("Load error:", e); alert("Error loading test data."); }
        }

        function renderQuestion() {
            logTime();
            const q = allQuestions[currentIndex];
            visitedList[currentIndex] = true;
            localStorage.setItem('cp_visited', JSON.stringify(visitedList));

            document.getElementById("q-number-badge").innerText = `Question ${currentIndex + 1}`;
            document.getElementById("subject-tag").innerText = q.subjectCategory || q.subject || "CIVIL ENGINEERING";
            document.getElementById("question-display").innerHTML = q.questionText || q.Question;

            const oDisplay = document.getElementById("options-display");
            oDisplay.innerHTML = "";
            const options = q.options || [q.OptionA, q.OptionB, q.OptionC, q.OptionD];

            options.forEach((opt, index) => {
                const isSelected = studentAnswers[currentIndex] === index;
                const letter = String.fromCharCode(65 + index);
                const btn = document.createElement("label");
                btn.className = `flex items-center p-4 border-2 rounded-xl cursor-pointer transition-all ${isSelected ? 'border-blue-600 bg-blue-50' : 'border-slate-100 hover:bg-slate-50'}`;
                btn.innerHTML = `
                    <div class="flex items-center gap-4 w-full">
                        <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center font-bold text-sm ${isSelected ? 'bg-blue-600 border-blue-600 text-white' : 'border-slate-300 text-slate-500'}">${letter}</div>
                        <input type="radio" name="option" class="hidden" ${isSelected ? 'checked' : ''} onchange="recordAnswer(${index})">
                        <span class="font-medium">${opt}</span>
                    </div>`;
                oDisplay.appendChild(btn);
            });

            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise();
            }
            updatePalette();
        }

        function logTime() {
            const now = Date.now();
            const diff = Math.floor((now - lastTime) / 1000);
            timeSpentPerQ[currentIndex] = (timeSpentPerQ[currentIndex] || 0) + diff;
            localStorage.setItem('cp_time_spent', JSON.stringify(timeSpentPerQ));
            lastTime = now;
        }

        function recordAnswer(index) {
            studentAnswers[currentIndex] = index;
            localStorage.setItem('cp_answers', JSON.stringify(studentAnswers));
            setTimeout(renderQuestion, 150); 
        }

        function clearResponse() {
            delete studentAnswers[currentIndex];
            localStorage.setItem('cp_answers', JSON.stringify(studentAnswers));
            renderQuestion();
        }

        function markReview() {
            reviewList[currentIndex] = true;
            localStorage.setItem('cp_reviews', JSON.stringify(reviewList));
            nextQuestion();
        }

        function saveAndNext() {
            if (studentAnswers[currentIndex] !== undefined) {
                delete reviewList[currentIndex];
                localStorage.setItem('cp_reviews', JSON.stringify(reviewList));
            }
            nextQuestion();
        }

        function nextQuestion() {
            if (currentIndex < allQuestions.length - 1) { currentIndex++; renderQuestion(); }
        }

        function prevQuestion() {
            if (currentIndex > 0) { currentIndex--; renderQuestion(); }
        }

        function updatePalette() {
            const palette = document.getElementById("palette-container");
            palette.innerHTML = "";
            let ans = 0, rev = 0, vis = 0;

            allQuestions.forEach((_, i) => {
                let status = "bg-slate-100 text-slate-400";
                if (reviewList[i]) { status = "bg-orange-500 text-white"; rev++; }
                else if (studentAnswers[i] !== undefined) { status = "bg-green-600 text-white"; ans++; }
                else if (visitedList[i]) { status = "bg-slate-300 text-white"; vis++; }

                const btn = document.createElement("button");
                btn.className = `w-10 h-10 rounded-lg text-xs font-bold transition-all ${status} ${i === currentIndex ? 'selected-q' : ''}`;
                btn.innerText = i + 1;
                btn.onclick = () => { currentIndex = i; renderQuestion(); };
                palette.appendChild(btn);
            });

            document.getElementById("stat-answered").innerText = ans;
            document.getElementById("stat-review").innerText = rev;
            document.getElementById("stat-not-visited").innerText = vis;
            document.getElementById("stat-not-visited-total").innerText = allQuestions.length - (vis + ans + rev);
        }

        function startTimer() {
            const timerInterval = setInterval(() => {
                if (timeInSeconds <= 0) { 
                    clearInterval(timerInterval);
                    processSubmit(); 
                    return; 
                }
                const h = Math.floor(timeInSeconds / 3600);
                const m = Math.floor((timeInSeconds % 3600) / 60);
                const s = timeInSeconds % 60;
                
                // Format H:MM:SS
                document.getElementById('timer').innerText = `${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
                
                timeInSeconds--;
                if (timeInSeconds % 10 === 0) localStorage.setItem('cp_timer', timeInSeconds);
            }, 1000);
        }

        function confirmSubmit() { document.getElementById('submitModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('submitModal').classList.add('hidden'); }

        async function processSubmit() {
            const btn = document.getElementById('finalSubmitBtn');
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> FINALIZING...';
            btn.disabled = true;

            try {
                logTime();
                let subjectsMap = {}; 
                let subjectCorrectCounts = {};
                let subjectTotalCounts = {};

                const report = allQuestions.map((q, i) => {
                    const letterToIdx = { 'A': 0, 'B': 1, 'C': 2, 'D': 3 };
                    const correctIdx = typeof q.CorrectAnswer === 'string' ? letterToIdx[q.CorrectAnswer] : (q.correctIndex || 0);
                    const isCorrect = studentAnswers[i] === correctIdx;
                    const subName = (q.subjectCategory || q.subject || "GENERAL").toUpperCase();
                    
                    if (!subjectTotalCounts[subName]) {
                        subjectTotalCounts[subName] = 0;
                        subjectCorrectCounts[subName] = 0;
                    }
                    subjectTotalCounts[subName]++;
                    if (isCorrect) subjectCorrectCounts[subName]++;

                    return {
                        ...q,
                        userAnswer: studentAnswers[i],
                        isCorrect: isCorrect,
                        timeSpent: timeSpentPerQ[i] || 0
                    };
                });

                Object.keys(subjectTotalCounts).forEach(key => {
                    subjectsMap[key] = Math.round((subjectCorrectCounts[key] / subjectTotalCounts[key]) * 100);
                });

                const answeredQs = report.filter(q => q.userAnswer !== undefined);
                const correctCount = report.filter(q => q.userAnswer !== undefined && q.isCorrect).length;
                const incorrectCount = answeredQs.length - correctCount;
                const finalScore = (correctCount * 1) - (incorrectCount * 0.33);
                const accuracy = answeredQs.length > 0 ? Math.round((correctCount / answeredQs.length) * 100) : 0;

                localStorage.setItem('detailedTestReport', JSON.stringify(report));
                localStorage.setItem('lastTestResult', JSON.stringify({
                    total: finalScore.toFixed(2),
                    correct: correctCount, 
                    incorrect: incorrectCount, 
                    totalQ: allQuestions.length,
                    accuracy: accuracy
                }));

                try {
                    await db.collection("leaderboard").add({
                        name: localStorage.getItem('userName') || "Madhukar",
                        score: parseFloat(finalScore.toFixed(2)),
                        totalQ: allQuestions.length,
                        accuracy: accuracy,
                        subjects: subjectsMap,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (fbErr) { console.warn("Cloud sync failed, using local backup."); }

                ['cp_answers', 'cp_reviews', 'cp_visited', 'cp_timer', 'cp_time_spent'].forEach(k => localStorage.removeItem(k));
                window.onbeforeunload = null; 
                window.location.href = "result.html";

            } catch (err) {
                console.error("Submit Error:", err);
                alert("Critical error during submission. Check console.");
                btn.innerHTML = "RETRY";
                btn.disabled = false;
            }
        }

        window.onbeforeunload = function() { return "Progress will be lost!"; };
        loadTestData();
    </script>
</body>
</html>
