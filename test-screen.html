<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Examination | Competition Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], processEscapes: true },
            options: { enableMenu: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        /* Optimized Skeleton Loader */
        .loading #question-content { opacity: 0; }
        .loading::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 24px;
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; border-radius: 4px;
        }

        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .q-node {
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700; border-radius: 6px; cursor: pointer;
            transition: all 0.2s ease; border: 2px solid transparent;
        }
        .q-active { border-color: #2563eb !important; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
        aside.collapsed { width: 0; overflow: hidden; opacity: 0; }
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden no-select">

    <header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-8 z-30 shadow-sm">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="text-slate-400 hover:text-blue-600 p-1"><i class="fas fa-bars-staggered text-lg"></i></button>
            <div class="bg-blue-600 p-1.5 rounded-lg"><i class="fas fa-graduation-cap text-white"></i></div>
            <h1 class="font-bold text-slate-800 text-sm md:text-base flex items-center gap-2 uppercase">
                <span>Competition <span class="text-blue-600">Plus</span></span>
                <span id="test-title-display" class="text-slate-500 font-semibold ml-2 border-l pl-3 border-slate-300 hidden md:block">...</span>
            </h1>
        </div>
        <div class="flex items-center gap-4 bg-slate-100 px-4 py-1.5 rounded-full border border-slate-200">
            <i class="far fa-clock text-blue-600 animate-pulse"></i>
            <span id="timer" class="font-mono font-bold text-slate-700 tabular-nums text-lg">00:00:00</span>
        </div>
        <button onclick="confirmSubmit()" class="bg-slate-800 hover:bg-red-700 text-white px-6 py-2 rounded-lg text-[11px] font-bold transition-all shadow-md uppercase tracking-wider">Finish Test</button>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <section class="flex-1 overflow-y-auto relative p-4 md:p-8">
            <div class="max-w-4xl mx-auto">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-h-[500px] flex flex-col">
                    <div class="bg-slate-50/80 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <span id="q-number-badge" class="relative px-3.5 py-1.5 rounded-md text-[12px] font-bold uppercase tracking-widest transition-all duration-300">Question 01</span>
                            <span id="subject-tag" class="text-slate-500 text-[11px] font-bold uppercase tracking-widest ml-3">General</span>
                        </div>
                        <div class="flex items-center bg-slate-200/50 border border-slate-200 rounded-lg p-1">
                            <button onclick="setLanguage('en')" id="lang-en" class="px-4 py-1.5 rounded-md text-[12px] font-bold transition-all">ENGLISH</button>
                            <button onclick="setLanguage('hi')" id="lang-hi" class="px-4 py-1.5 rounded-md text-[12px] font-bold transition-all">हिन्दी</button>
                        </div>
                    </div>

                    <div class="p-6 md:p-12 flex-1">
                        <div id="question-container" class="mb-10 min-h-[120px] relative">
                            <div id="question-content" class="text-lg leading-relaxed text-slate-800 font-medium">Loading...</div>
                        </div>
                        <div id="options-grid" class="grid gap-4"></div>
                    </div>

                    <div class="p-4 bg-slate-50 border-t border-slate-200 flex flex-wrap gap-3 items-center justify-between">
                        <button onclick="prevQuestion()" class="flex items-center gap-2 px-4 py-2 text-slate-600 font-bold text-sm hover:text-blue-600 transition">
                            <i class="fas fa-arrow-left"></i> PREVIOUS
                        </button>
                        <div class="flex gap-2">
                            <button onclick="clearResponse()" class="px-4 py-2 border border-slate-300 text-slate-500 rounded-lg text-xs font-bold hover:bg-white transition">CLEAR</button>
                            <button onclick="markReview()" class="px-4 py-2 bg-purple-50 border border-purple-200 text-purple-600 rounded-lg text-xs font-bold hover:bg-purple-100 transition">MARK FOR REVIEW</button>
                            <button onclick="saveAndNext()" class="px-8 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 shadow-lg transition-all active:scale-95 flex items-center gap-2">
                                SAVE & NEXT <i class="fas fa-chevron-right text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <aside id="sidebar" class="w-80 bg-white border-l border-slate-200 flex flex-col z-40 transition-all duration-300">
            <div class="p-5 border-b border-slate-100 flex items-center gap-4">
                <img src="https://ui-avatars.com/api/?name=Aspirant&background=0D8ABC&color=fff" class="w-12 h-12 rounded-xl" alt="Profile">
                <div>
                    <h4 class="font-bold text-slate-800 text-sm">Official Aspirant</h4>
                    <p class="text-[10px] text-slate-500 font-bold uppercase">CP-2026-88</p>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-5">
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4">Question Palette</p>
                <div id="palette-grid" class="grid grid-cols-5 gap-3"></div>
            </div>
        </aside>
    </main>

    <div id="submit-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
        </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAl9iSJhwn5IAUCA5LrgPK5FzFZPtWNZo",
            authDomain: "competition-plus-9996b.firebaseapp.com",
            projectId: "competition-plus-9996b",
            storageBucket: "competition-plus-9996b.firebasestorage.app",
            messagingSenderId: "49252651907",
            appId: "1:49252651907:web:8a5162064aaf3e69bd1cb6",
            databaseURL: "https://competition-plus-9996b-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();

        let allQuestions = [];
        let currentIndex = 0;
        let currentLang = 'en';
        let testId = new URLSearchParams(window.location.search).get('testId');
        
        let studentAnswers = JSON.parse(localStorage.getItem('cp_answers')) || {};
        let reviewList = JSON.parse(localStorage.getItem('cp_reviews')) || {};
        let visitedList = JSON.parse(localStorage.getItem('cp_visited')) || {};
        let timeSpentPerQuestion = JSON.parse(localStorage.getItem('cp_time_spent')) || [];
        let timeInSeconds = parseInt(localStorage.getItem('cp_timer')) || 3600;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

        async function loadTestData() {
            try {
                if (!testId) {
                    const snap = await rtdb.ref('current_active_test').once('value');
                    testId = snap.val();
                }
                document.getElementById('test-title-display').innerText = testId.replace(/_/g, ' ');
                
                const snapshot = await rtdb.ref(testId).once('value');
                const rawData = snapshot.val();
                const dataArray = Array.isArray(rawData) ? rawData : Object.values(rawData);

                const grouped = {};
                dataArray.forEach(item => {
                    const qid = item.questionID;
                    if (!grouped[qid]) grouped[qid] = { en: null, hi: null };
                    const isHindi = /[\u0900-\u097F]/.test(item.questionText || item.explanation);
                    isHindi ? grouped[qid].hi = item : grouped[qid].en = item;
                });

                allQuestions = Object.values(grouped);
                if (timeSpentPerQuestion.length === 0) timeSpentPerQuestion = new Array(allQuestions.length).fill(0);
                
                renderQuestion();
                startTimer();
                updatePalette();
                startTimeTracker();
            } catch (e) { console.error("Load Error:", e); }
        }

        function setLanguage(lang) {
            currentLang = lang;
            const btnEn = document.getElementById('lang-en');
            const btnHi = document.getElementById('lang-hi');
            const active = "bg-blue-600 text-white shadow-sm";
            const inactive = "text-slate-600 hover:bg-white/50";
            
            btnEn.className = `px-4 py-1.5 rounded-md text-[12px] font-bold ${lang === 'en' ? active : inactive}`;
            btnHi.className = `px-4 py-1.5 rounded-md text-[12px] font-bold ${lang === 'hi' ? active : inactive}`;
            renderQuestion();
        }

        function renderQuestion() {
            const questionPair = allQuestions[currentIndex];
            if(!questionPair) return;

            const container = document.getElementById("question-container");
            container.classList.add('loading');

            const q = (currentLang === 'hi' && questionPair.hi) ? questionPair.hi : questionPair.en;
            visitedList[currentIndex] = true;
            saveToLocal();

            const badge = document.getElementById("q-number-badge");
            const isAns = studentAnswers[currentIndex] !== undefined;
            const isRev = reviewList[currentIndex];
            
            badge.className = `relative px-3.5 py-1.5 rounded-md text-[12px] font-bold uppercase transition-all ${
                isRev ? 'bg-purple-600 text-white' : (isAns ? 'bg-green-500 text-white' : 'bg-slate-800 text-white')
            }`;
            badge.innerHTML = `Question ${String(currentIndex + 1).padStart(2, '0')}${isRev && isAns ? '<div class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-green-400 border-2 border-white rounded-full"></div>' : ''}`;
            
            document.getElementById("subject-tag").innerText = q.subject || "General";
            document.getElementById("question-content").innerHTML = q.questionText;

            const grid = document.getElementById("options-grid");
            const options = q.options || [];
            grid.className = options.every(o => o.length < 30) ? "grid grid-cols-1 md:grid-cols-2 gap-4" : "grid grid-cols-1 gap-4";
            
            const frag = document.createDocumentFragment();
            options.forEach((opt, idx) => {
                const selected = studentAnswers[currentIndex] === idx;
                const div = document.createElement("div");
                div.className = `group p-4 border-2 rounded-xl cursor-pointer flex items-center gap-4 transition-all ${selected ? 'border-blue-500 bg-blue-50' : 'border-slate-100 hover:bg-slate-50'}`;
                div.innerHTML = `
                    <div class="w-8 h-8 shrink-0 rounded-lg flex items-center justify-center font-bold text-sm ${selected ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500'}">${String.fromCharCode(65 + idx)}</div>
                    <div class="text-sm md:text-base text-slate-700">${opt}</div>
                    ${selected ? '<i class="fas fa-check-circle text-blue-600 text-lg ml-auto"></i>' : ''}
                `;
                div.onclick = () => selectOption(idx);
                frag.appendChild(div);
            });
            grid.innerHTML = "";
            grid.appendChild(frag);

            if (window.MathJax) {
                MathJax.typesetPromise().then(() => container.classList.remove('loading'));
            } else {
                container.classList.remove('loading');
            }
        }

        function updatePalette() {
            const grid = document.getElementById("palette-grid");
            const frag = document.createDocumentFragment();
            allQuestions.forEach((_, i) => {
                const isAns = studentAnswers[i] !== undefined;
                const isRev = reviewList[i];
                let bg = "bg-white text-slate-400 border-slate-200";
                let dot = "";

                if (isRev && isAns) { bg = "bg-purple-600 text-white"; dot = '<div class="absolute -top-0.5 -right-0.5 w-2 h-2 bg-green-400 rounded-full border border-purple-600"></div>'; }
                else if (isRev) { bg = "bg-purple-600 text-white"; }
                else if (isAns) { bg = "bg-green-500 text-white"; }
                else if (visitedList[i]) { bg = "bg-red-500 text-white"; }

                const node = document.createElement("div");
                node.className = `q-node relative ${bg} ${i === currentIndex ? 'q-active' : ''}`;
                node.innerHTML = `<span>${i + 1}</span>${dot}`;
                node.onclick = () => { currentIndex = i; renderQuestion(); updatePalette(); };
                frag.appendChild(node);
            });
            grid.innerHTML = "";
            grid.appendChild(frag);
        }

        function startTimer() {
            setInterval(() => {
                if (timeInSeconds <= 0) return finalSubmit();
                timeInSeconds--;
                const h = Math.floor(timeInSeconds / 3600);
                const m = Math.floor((timeInSeconds % 3600) / 60);
                const s = timeInSeconds % 60;
                document.getElementById('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                if (timeInSeconds % 10 === 0) localStorage.setItem('cp_timer', timeInSeconds);
            }, 1000);
        }

        function startTimeTracker() {
            setInterval(() => {
                if (allQuestions.length > 0) {
                    timeSpentPerQuestion[currentIndex]++;
                    if (timeSpentPerQuestion[currentIndex] % 5 === 0) localStorage.setItem('cp_time_spent', JSON.stringify(timeSpentPerQuestion));
                }
            }, 1000);
        }

        function selectOption(idx) {
            studentAnswers[currentIndex] = idx;
            saveToLocal();
            renderQuestion();
            updatePalette();
        }

        function saveAndNext() {
            delete reviewList[currentIndex];
            saveToLocal();
            if (currentIndex < allQuestions.length - 1) { currentIndex++; renderQuestion(); updatePalette(); }
        }

        function markReview() {
            reviewList[currentIndex] = true;
            saveToLocal();
            if (currentIndex < allQuestions.length - 1) { currentIndex++; renderQuestion(); updatePalette(); }
        }

        function saveToLocal() {
            localStorage.setItem('cp_answers', JSON.stringify(studentAnswers));
            localStorage.setItem('cp_reviews', JSON.stringify(reviewList));
            localStorage.setItem('cp_visited', JSON.stringify(visitedList));
        }

        // Security
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === "F12" || (e.ctrlKey && ['c','v','u','s','p'].includes(e.key.toLowerCase()))) {
                e.preventDefault();
            }
        });

        loadTestData();
    </script>
</body>
</html>
