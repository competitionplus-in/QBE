    <script>

        function confirmSubmit() {
    if(confirm("Are you sure you want to end the test?")) {
        let correctCount = 0;
        let incorrectCount = 0;
        let subjectScores = { "Civil": 0, "GK": 0, "Hindi": 0 };

        selectedQuestions.forEach((q, index) => {
            const studentAns = studentAnswers[index];
            if (studentAns !== undefined) {
                if (studentAns === q.answer) {
                    correctCount++;
                    subjectScores[q.subject] += 1;
                } else {
                    incorrectCount++;
                    subjectScores[q.subject] -= 0.33; // Apply Rajasthan 1/3 negative marking
                }
            }
        });

        const totalMarks = (correctCount * 1) - (incorrectCount * 0.33);

        // Save data to browser memory
        const report = {
            total: totalMarks.toFixed(2),
            correct: correctCount,
            incorrect: incorrectCount,
            skipped: selectedQuestions.length - (correctCount + incorrectCount),
            subjects: subjectScores
        };
        
        localStorage.setItem('lastTestResult', JSON.stringify(report));
        window.location.href = "result.html";
    }
}
        // CONFIGURATION
const DB_URL = "https://competition-plus-9996b-default-rtdb.asia-southeast1.firebasedatabase.app/questions.json";
let allQuestions = [];
let currentIndex = 0;
let studentAnswers = {}; 
let timeInSeconds = 120 * 60; // 120 Minutes

// 1. FETCH FROM FIREBASE
async function loadTestData() {
    try {
        const response = await fetch(DB_URL);
        const data = await response.json();
        // Convert Firebase object to Array
        allQuestions = Object.values(data);
        
        if(allQuestions.length > 0) {
            renderQuestion();
            updatePalette();
            startTimer(); // Timer starts only after questions load
        } else {
            document.getElementById("question-display").innerText = "No questions found in database.";
        }
    } catch (error) {
        console.error("Firebase Error:", error);
        document.getElementById("question-display").innerText = "Error connecting to server.";
    }
}

// 2. DISPLAY QUESTION
function renderQuestion() {
    const q = allQuestions[currentIndex];
    const qDisplay = document.getElementById("question-display");
    const oDisplay = document.getElementById("options-display");

    qDisplay.innerText = `${currentIndex + 1}. ${q.questionText}`;

    oDisplay.innerHTML = "";
    q.options.forEach((opt, index) => {
        const isSelected = studentAnswers[currentIndex] === index;
        const btn = document.createElement("label");
        btn.className = `flex items-center p-4 border-2 rounded-xl cursor-pointer transition-all group ${
            isSelected ? 'border-blue-600 bg-blue-50' : 'border-slate-100 hover:bg-blue-50'
        }`;
        
        btn.innerHTML = `
            <input type="radio" name="option" class="w-5 h-5 text-blue-600" 
            ${isSelected ? 'checked' : ''} onclick="recordAnswer(${index})">
            <span class="ml-4 ${isSelected ? 'text-blue-900 font-bold' : 'text-slate-700 font-medium'}">${opt}</span>
        `;
        oDisplay.appendChild(btn);
    });

    document.querySelector(".bg-blue-700.text-white.px-3").innerText = `Question ${currentIndex + 1}`;
}

// 3. LOGIC FOR NAVIGATION
function recordAnswer(index) {
    studentAnswers[currentIndex] = index;
    updatePalette(); // Update green color immediately
}

function nextQuestion() {
    if (currentIndex < allQuestions.length - 1) {
        currentIndex++;
        renderQuestion();
        updatePalette();
    }
}

function prevQuestion() {
    if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
        updatePalette();
    }
}

// 4. UPDATE SIDEBAR PALETTE & STATS
function updatePalette() {
    const palette = document.querySelector(".grid-cols-5");
    palette.innerHTML = "";
    let answeredCount = 0;
    
    allQuestions.forEach((_, i) => {
        let statusClass = "bg-slate-100 text-slate-400"; // Not Answered
        if (studentAnswers[i] !== undefined) {
            statusClass = "bg-green-600 text-white";
            answeredCount++;
        }
        if (i === currentIndex) statusClass = "border-2 border-blue-600 text-blue-600";

        const btn = document.createElement("button");
        btn.className = `w-10 h-10 rounded text-xs font-bold ${statusClass}`;
        btn.innerText = i + 1;
        btn.onclick = () => { currentIndex = i; renderQuestion(); updatePalette(); };
        palette.appendChild(btn);
    });

    // Update bottom stats
    const notVisited = allQuestions.length - answeredCount;
    // Assuming your HTML has these IDs as per previous suggestion
    if(document.getElementById("stat-answered")) {
        document.getElementById("stat-answered").innerText = answeredCount;
        document.getElementById("stat-not-visited").innerText = notVisited;
    }
}

// 5. TIMER LOGIC
function startTimer() {
    const timerElement = document.getElementById('timer');
    const countdown = setInterval(() => {
        const minutes = Math.floor(timeInSeconds / 60);
        const seconds = timeInSeconds % 60;
        timerElement.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

        if (timeInSeconds <= 0) {
            clearInterval(countdown);
            alert("Time is up! Your test will be submitted automatically.");
            confirmSubmit();
        } else {
            timeInSeconds--;
        }
    }, 1000);
}

// 6. SUBMIT & CALCULATE (RPSC 1/3 Pattern)
function confirmSubmit() {
    if(confirm("Are you sure you want to end the test?")) {
        let correctCount = 0;
        let incorrectCount = 0;

        allQuestions.forEach((q, index) => {
            const ans = studentAnswers[index];
            if (ans !== undefined) {
                if (ans === q.correctIndex) correctCount++;
                else incorrectCount++;
            }
        });

        const finalMarks = (correctCount * 1) - (incorrectCount * 0.33);

        const report = {
            total: finalMarks.toFixed(2),
            correct: correctCount,
            incorrect: incorrectCount,
            skipped: allQuestions.length - (correctCount + incorrectCount),
            totalQ: allQuestions.length
        };
        
        localStorage.setItem('lastTestResult', JSON.stringify(report));
        window.location.href = "result.html";
    }
}

// Initialize
document.addEventListener('contextmenu', event => event.preventDefault());
loadTestData();    </script>
