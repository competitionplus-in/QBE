<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Competition Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .auth-gradient { background: linear-gradient(135deg, #1e40af 0%, #1e1b4b 100%); }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCAl9iSJhwn5IAUCA5LrgPK5FzFZPtWNZo",
    authDomain: "competition-plus-9996b.firebaseapp.com",
    projectId: "competition-plus-9996b",
    storageBucket: "competition-plus-9996b.firebasestorage.app",
    messagingSenderId: "49252651907",
    appId: "1:49252651907:web:8a5162064aaf3e69bd1cb6",
    measurementId: "G-ESTWZJ5X0K"
  };
  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
</script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
        
        <div class="auth-gradient h-2"></div>

        <div class="p-8 md:p-10">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-2xl mb-4">
                    <i class="fas fa-user-shield text-blue-700 text-2xl"></i>
                </div>
                <h1 id="auth-title" class="text-3xl font-800 text-slate-900 tracking-tight">Welcome Back</h1>
                <p id="auth-subtitle" class="text-slate-500 mt-2">Log in to continue your preparation</p>
            </div>

            <form id="auth-form" class="space-y-5" onsubmit="handleAuth(event)">
                <div id="name-field" class="hidden">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Full Name</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" placeholder="Enter your name" class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="email" required placeholder="name@example.com" class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-bold text-slate-700">Password</label>
                        <a href="#" class="text-xs font-semibold text-blue-700 hover:underline">Forgot?</a>
                    </div>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="password" required placeholder="••••••••" class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition">
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-lg transition transform hover:-translate-y-0.5 active:scale-95">
                    Continue <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-400 font-bold tracking-widest">Or Secure Login</span></div>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <button class="flex items-center justify-center gap-3 border border-slate-200 py-3 rounded-xl hover:bg-slate-50 transition font-semibold text-slate-700">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5" alt="Google">
                    Sign in with Google
                </button>
            </div>

            <p class="text-center mt-10 text-slate-600 font-medium">
                <span id="toggle-text">New to Competition Plus?</span> 
                <button onclick="toggleAuth()" id="toggle-btn" class="text-blue-700 font-bold hover:underline ml-1">Create Account</button>
            </p>
        </div>
    </div>

    <script>
    let isLogin = true;

    function toggleAuth() {
        isLogin = !isLogin;
        const title = document.getElementById('auth-title');
        const subtitle = document.getElementById('auth-subtitle');
        const nameField = document.getElementById('name-field');
        const toggleText = document.getElementById('toggle-text');
        const toggleBtn = document.getElementById('toggle-btn');

        if (isLogin) {
            title.innerText = "Welcome Back";
            subtitle.innerText = "Log in to continue your preparation";
            nameField.classList.add('hidden');
            toggleText.innerText = "New to Competition Plus?";
            toggleBtn.innerText = "Create Account";
        } else {
            title.innerText = "Get Started";
            subtitle.innerText = "Create your free account today";
            nameField.classList.remove('hidden');
            toggleText.innerText = "Already have an account?";
            toggleBtn.innerText = "Login here";
        }
    }

    function handleAuth(e) {
        e.preventDefault();
        
        // Correctly select inputs regardless of whether name-field is hidden
        const inputs = e.target.querySelectorAll('input');
        const fullName = inputs[0].value;
        const email = inputs[1].value;
        const password = inputs[2].value;

        if (isLogin) {
            // FIREBASE LOGIN
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    console.log("Logged in:", userCredential.user.email);
                    window.location.href = "index.html";
                })
                .catch((error) => {
                    alert("Login Failed: " + error.message);
                });
        } else {
            // FIREBASE SIGN UP
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Store the user's name in Firestore
                    return db.collection("users").doc(userCredential.user.uid).set({
                        name: fullName,
                        email: email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(() => {
                    console.log("Account created successfully!");
                    window.location.href = "index.html";
                })
                .catch((error) => {
                    alert("Registration Failed: " + error.message);
                });
        }
    }
</script>
</body>
</html>
