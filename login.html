<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Competition Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(at top left, #e0e7ff 0%, #f8fafc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .decorative-card {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.7);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .decorative-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            z-index: 20;
        }

        .tab-active { 
            color: #2563eb; 
            border-bottom: 3px solid #2563eb;
        }

        .input-group { position: relative; }
        
        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 14px;
        }

        .custom-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .custom-input:focus {
            background-color: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
            outline: none;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-google {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            color: #1e293b;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
        }

        .btn-google:hover {
            background: #f8fafc;
            transform: translateY(-1px);
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-[460px] w-full decorative-card h-[92vh] max-h-[850px]">
        
        <div class="px-8 pt-10 pb-4 text-center bg-white">
            <h1 class="text-2xl font-800 text-slate-900 tracking-tight uppercase">COMPETITION PLUS</h1>
            <p class="text-slate-500 text-sm mt-1 font-500">Rajasthan's No.1 Student Portal</p>
        </div>

        <div class="px-8 pb-4 bg-white">
            <button type="button" onclick="googleLogin()" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-5 h-5">
                <span>Continue with Google</span>
            </button>

            <div class="relative py-6">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                <div class="relative flex justify-center text-[10px] uppercase font-800 tracking-widest"><span class="bg-white px-4 text-slate-400">Or use email</span></div>
            </div>
        </div>

        <div class="flex border-b border-slate-100 bg-white sticky top-0 z-10">
            <button onclick="switchTab('register')" id="tab-register" class="flex-1 py-4 text-[11px] font-800 uppercase tracking-widest text-slate-400 tab-active">Register</button>
            <button onclick="switchTab('login')" id="tab-login" class="flex-1 py-4 text-[11px] font-800 uppercase tracking-widest text-slate-400">Login</button>
        </div>

        <div id="formScrollArea" class="p-8 overflow-y-auto custom-scroll flex-grow bg-white">
            
            <form id="registerForm" class="space-y-5">
                <div class="space-y-1">
                    <label class="text-[10px] font-800 text-slate-400 uppercase tracking-widest ml-1">Full Name</label>
                    <div class="input-group">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="regName" placeholder="Full Name" class="custom-input" required>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-800 text-slate-400 uppercase tracking-widest ml-1">Mobile Number</label>
                    <div class="input-group">
                        <i class="fas fa-phone input-icon"></i>
                        <input type="tel" id="regMobile" placeholder="Mobile Number" class="custom-input" required>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-800 text-slate-400 uppercase tracking-widest ml-1">Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="regEmail" placeholder="Email Address" class="custom-input" required>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-800 text-slate-400 uppercase tracking-widest ml-1">Branch</label>
                    <div class="input-group">
                        <i class="fas fa-graduation-cap input-icon"></i>
                        <select id="regBranch" class="custom-input" required>
                            <option value="">Select Branch</option>
                            <option value="Civil">Civil Engineering</option>
                            <option value="Mechanical">Mechanical Engineering</option>
                            <option value="Electrical">Electrical Engineering</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-800 text-slate-400 uppercase tracking-widest ml-1">Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="regPass" placeholder="••••••••" class="custom-input" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary shadow-lg shadow-blue-200 mt-2">Create My Account</button>
            </form>

            <form id="loginForm" class="hidden space-y-6 pt-2">
                <div class="space-y-1">
                    <label class="text-[10px] font-800 text-slate-400 uppercase tracking-widest ml-1">Email</label>
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="loginEmail" placeholder="Email Address" class="custom-input" required>
                    </div>
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between">
                        <label class="text-[10px] font-800 text-slate-400 uppercase tracking-widest ml-1">Password</label>
                        <a href="#" class="text-[10px] text-blue-600 font-800 uppercase">Forgot?</a>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="loginPass" placeholder="Password" class="custom-input" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary shadow-lg shadow-blue-200">Sign In</button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(type) {
            const regForm = document.getElementById('registerForm');
            const logForm = document.getElementById('loginForm');
            const regTab = document.getElementById('tab-register');
            const logTab = document.getElementById('tab-login');
            const scrollArea = document.getElementById('formScrollArea');

            if (type === 'login') {
                regForm.classList.add('hidden');
                logForm.classList.remove('hidden');
                logTab.classList.add('tab-active');
                regTab.classList.remove('tab-active');
                setTimeout(() => document.getElementById('loginEmail').focus(), 100);
            } else {
                logForm.classList.add('hidden');
                regForm.classList.remove('hidden');
                regTab.classList.add('tab-active');
                logTab.classList.remove('tab-active');
                setTimeout(() => document.getElementById('regName').focus(), 100);
            }
            scrollArea.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Logic to redirect to test-screen.html
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            window.location.href = 'test-screen.html';
        };

        document.getElementById('registerForm').onsubmit = function(e) {
            e.preventDefault();
            window.location.href = 'test-screen.html';
        };
        
        function googleLogin() {
            console.log("Firebase Google Auth Triggered");
            window.location.href = 'test-screen.html';
        }
    </script>
</body>
</html>
