<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Mock Tests | Competition Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCAl9iSJhwn5IAUCA5LrgPK5FzFZPtWNZo",
        authDomain: "competition-plus-9996b.firebaseapp.com",
        projectId: "competition-plus-9996b",
        storageBucket: "competition-plus-9996b.firebasestorage.app",
        messagingSenderId: "49252651907",
        appId: "1:49252651907:web:8a5162064aaf3e69bd1cb6",
        measurementId: "G-ESTWZJ5X0K"
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      async function loadTestList() {
          const container = document.getElementById('test-grid');
          try {
              const snapshot = await db.collection("tests").where("isActive", "==", true).get();
              
              if(snapshot.empty) {
                  container.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400 font-medium">No tests active. Please check back later.</div>`;
                  return;
              }

              container.innerHTML = "";
              snapshot.forEach(doc => {
                  const test = doc.data();
                  const testId = doc.id;
                  
                  container.innerHTML += `
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-xl hover:border-blue-200 transition-all group">
                        <div class="flex justify-between items-center mb-4">
                            <span class="px-3 py-1 bg-blue-50 text-blue-700 text-[10px] font-bold uppercase rounded-lg tracking-wider">
                                ${test.category || 'Standard'}
                            </span>
                            <span class="text-xs text-slate-400 font-semibold">
                                <i class="far fa-clock mr-1"></i> ${test.duration || 120} Mins
                            </span>
                        </div>
                        <h3 class="text-xl font-bold text-slate-900 mb-2 group-hover:text-blue-700 transition-colors">
                            ${test.title}
                        </h3>
                        <div class="flex items-center gap-4 mb-6 text-sm text-slate-500 font-medium">
                            <span><i class="fas fa-tasks mr-2 text-blue-500"></i>${test.totalQ || 0} Questions</span>
                        </div>
                        <button onclick="goToTest('${testId}')" class="w-full bg-slate-900 hover:bg-blue-700 text-white py-3.5 rounded-xl font-bold transition transform hover:-translate-y-1 shadow-lg">
                            Attempt Now
                        </button>
                    </div>
                  `;
              });
          } catch (e) {
              console.error(e);
              container.innerHTML = `<p class="col-span-full text-center text-red-500">Failed to sync tests. Please refresh.</p>`;
          }
      }

      function goToTest(id) {
          const userName = localStorage.getItem('userName');
          if (!userName) {
              const name = prompt("Please enter your name for the leaderboard:");
              if (!name) return;
              localStorage.setItem('userName', name.trim());
          }
          window.location.href = `test-screen.html?testId=${id}`;
      }

      window.onload = loadTestList;
    </script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="glass-nav sticky top-0 z-50 border-b border-slate-200 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-700 text-white p-1.5 rounded-lg">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1 class="text-xl font-extrabold tracking-tight text-slate-900">COMPETITION <span class="text-blue-700">PLUS</span></h1>
            </div>
            <a href="index.html" class="text-sm font-bold text-slate-600 hover:text-blue-700 transition">Back to Home</a>
        </div>
    </nav>

    <header class="py-12 bg-white border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-3xl font-extrabold text-slate-900">Mock Test Series</h2>
            <p class="text-slate-500 mt-2 font-medium">Select a paper to start your preparation for RSSB/RPSC exams.</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="test-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="animate-pulse bg-white rounded-3xl h-64 border border-slate-100"></div>
            <div class="animate-pulse bg-white rounded-3xl h-64 border border-slate-100"></div>
            <div class="animate-pulse bg-white rounded-3xl h-64 border border-slate-100"></div>
        </div>
    </main>

    <footer class="py-10 text-center text-slate-400 text-sm">
        &copy; 2026 Competition Plus | Rajasthan Civil JEn Experts
    </footer>

</body>
</html>
